<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SKY BLASTER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#050a14;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Orbitron',monospace;
  color:#fff;overflow:hidden;
  touch-action:none;user-select:none;
}
#wrapper{display:flex;flex-direction:column;width:min(460px,98vw);}
#hud{
  display:flex;justify-content:space-between;
  padding:7px 14px;background:rgba(0,0,0,0.7);
  border:1px solid #00d4ff;border-bottom:none;
  border-radius:6px 6px 0 0;
  font-size:clamp(9px,2.8vw,13px);letter-spacing:2px;
}
.hl{color:#00d4ff;} .hv{color:#ffe600;font-weight:700;}
#cWrap{
  position:relative;background:#050a14;
  border:1px solid #00d4ff;overflow:hidden;
}
canvas{display:block;width:100%;height:100%;}
#pad{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1.4fr;
  gap:5px;padding:7px 8px;background:rgba(0,0,0,0.7);
  border:1px solid #00d4ff;border-top:none;
  border-radius:0 0 6px 6px;
}
.btn{
  padding:11px 0;border:1px solid #00d4ff;
  background:rgba(0,212,255,.07);color:#00d4ff;
  font-size:20px;border-radius:4px;cursor:pointer;
  text-align:center;-webkit-tap-highlight-color:transparent;
}
.btn.on{background:rgba(0,212,255,.25);box-shadow:0 0 10px #00d4ff;}
#bFire{border-color:#ff2d78;color:#ff2d78;font-size:11px;letter-spacing:1px;}
#bFire.on{background:rgba(255,45,120,.22);box-shadow:0 0 10px #ff2d78;}
.ov{
  position:absolute;inset:0;background:rgba(4,8,18,.93);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:20px;text-align:center;z-index:10;
}
.ov.off{display:none;}
.ov h1{
  font-size:clamp(34px,11vw,64px);font-weight:900;
  color:#00d4ff;text-shadow:0 0 28px #00d4ff;
  line-height:1;letter-spacing:4px;
}
.ov h2{font-size:clamp(11px,3.5vw,15px);color:#ff2d78;letter-spacing:3px;}
.ov p{font-size:clamp(11px,3vw,14px);color:#aaa;line-height:2;}
.ov p b{color:#ffe600;}
.pBtn{
  padding:13px 38px;border:2px solid #39ff14;
  background:transparent;color:#39ff14;
  font-family:'Orbitron',monospace;
  font-size:clamp(12px,3.5vw,15px);letter-spacing:3px;
  border-radius:4px;cursor:pointer;
  text-shadow:0 0 8px #39ff14;
  box-shadow:0 0 14px rgba(57,255,20,.3);
}
.pBtn:hover{background:rgba(57,255,20,.12);}
#finalScore{font-size:clamp(16px,5vw,26px);color:#ffe600;text-shadow:0 0 12px #ffe600;}
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div><span class="hl">SCORE </span><span class="hv" id="sScore">0</span></div>
    <div><span class="hl">LEVEL </span><span class="hv" id="sLevel">1</span></div>
    <div><span class="hl">VIES </span><span class="hv" id="sLives">&#10084;&#10084;&#10084;</span></div>
  </div>
  <div id="cWrap">
    <canvas id="c"></canvas>
    <div class="ov" id="scrStart">
      <h1>SKY<br>BLASTER</h1>
      <h2>&#8212; ARCADE SHOOTER &#8212;</h2>
      <p>
        <b>&#8592; &#8594; &#8593; &#8595;</b> Deplacer l'avion<br>
        <b>ESPACE</b> Tirer<br>
        Mobile : boutons en bas
      </p>
      <button class="pBtn" id="btnStart">&#9654; JOUER</button>
    </div>
    <div class="ov off" id="scrOver">
      <h1>GAME<br>OVER</h1>
      <div id="finalScore">SCORE : 0</div>
      <button class="pBtn" id="btnRestart">&#8629; REJOUER</button>
    </div>
  </div>
  <div id="pad">
    <button class="btn" id="bLeft">&#9664;</button>
    <button class="btn" id="bUp">&#9650;</button>
    <button class="btn" id="bDown">&#9660;</button>
    <button class="btn" id="bRight">&#9654;</button>
    <button class="btn" id="bFire">FEU</button>
  </div>
</div>
<script>
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var cWrap  = document.getElementById('cWrap');
var GW = 460, GH = 600;
canvas.width = GW; canvas.height = GH;

function setHeight() {
  cWrap.style.height = Math.round(cWrap.offsetWidth * GH / GW) + 'px';
}
setHeight();
window.addEventListener('resize', setHeight);

// Input
var K = {};
window.addEventListener('keydown', function(e) {
  K[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) !== -1) e.preventDefault();
});
window.addEventListener('keyup', function(e) { K[e.code] = false; });

var T = {left:false,right:false,up:false,down:false,fire:false};
function bindBtn(id, prop) {
  var el = document.getElementById(id);
  function on()  { T[prop]=true;  el.classList.add('on'); }
  function off() { T[prop]=false; el.classList.remove('on'); }
  el.addEventListener('touchstart', function(e){ e.preventDefault(); on(); }, {passive:false});
  el.addEventListener('touchend',   function(e){ e.preventDefault(); off(); });
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
bindBtn('bLeft','left'); bindBtn('bRight','right');
bindBtn('bUp','up');     bindBtn('bDown','down');
bindBtn('bFire','fire');

// State
var gState = 'start';
var score, lives, level, frame;
var plane, bullets, enemies, particles, stars;

function hud() {
  document.getElementById('sScore').textContent = score;
  document.getElementById('sLevel').textContent = level;
  var h = ''; for(var i=0;i<Math.max(0,lives);i++) h += String.fromCharCode(10084);
  document.getElementById('sLives').textContent = h;
}

function init() {
  score=0; lives=3; level=1; frame=0;
  hud();
  plane = {x:GW/2, y:GH*0.78, cool:0, inv:0};
  bullets=[]; enemies=[]; particles=[];
  stars=[];
  for(var i=0;i<80;i++) {
    stars.push({
      x:Math.random()*GW, y:Math.random()*GH,
      r:Math.random()*1.4+0.3,
      spd:Math.random()*1.2+0.3,
      a:Math.random()*0.7+0.3
    });
  }
}

// Enemy types
var TYPES = [
  {col:'#ff2d78',sz:18,hp:1,spd:1.8,pts:10,shape:'rock'},
  {col:'#ff8800',sz:22,hp:2,spd:1.0,pts:25,shape:'ufo'},
  {col:'#cc00ff',sz:14,hp:1,spd:2.8,pts:15,shape:'ast'},
  {col:'#ffe600',sz:28,hp:4,spd:0.6,pts:60,shape:'ship'},
];

function spawnEnemy() {
  var t = TYPES[Math.floor(Math.random()*TYPES.length)];
  enemies.push({
    x: t.sz + Math.random()*(GW-t.sz*2),
    y: -t.sz,
    vx: (Math.random()-0.5)*1.6,
    vy: t.spd + level*0.12,
    rot:0, rs:(Math.random()-0.5)*0.06,
    seed:Math.random()*10,
    t:t, hp:t.hp
  });
}

function burst(x,y,col,n) {
  n = n||12;
  for(var i=0;i<n;i++) {
    var a = Math.random()*Math.PI*2, s=Math.random()*3.5+1;
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:Math.random()*0.04+0.018,r:Math.random()*3+1,col:col});
  }
}

function cc(x1,y1,r1,x2,y2,r2) {
  var dx=x1-x2,dy=y1-y2;
  return dx*dx+dy*dy < (r1+r2)*(r1+r2);
}

function update() {
  if(gState !== 'play') return;
  frame++;

  var nl = 1 + Math.floor(score/150);
  if(nl !== level) { level=nl; hud(); }

  var spawnEvery = Math.max(28, 85-level*5);
  if(frame % spawnEvery === 0) spawnEnemy();

  var spd = 4 + level*0.1;
  if((K.ArrowLeft  || K.KeyA || T.left)  && plane.x > 18)       plane.x -= spd;
  if((K.ArrowRight || K.KeyD || T.right) && plane.x < GW-18)    plane.x += spd;
  if((K.ArrowUp    || K.KeyW || T.up)    && plane.y > 18)       plane.y -= spd;
  if((K.ArrowDown  || K.KeyS || T.down)  && plane.y < GH-18)    plane.y += spd;

  if(plane.cool > 0) plane.cool--;
  if((K.Space || K.KeyZ || T.fire) && plane.cool === 0) {
    bullets.push({x:plane.x, y:plane.y-20});
    plane.cool = Math.max(8, 20-level);
  }
  if(plane.inv > 0) plane.inv--;

  for(var i=bullets.length-1;i>=0;i--) {
    bullets[i].y -= 11;
    if(bullets[i].y < -10) bullets.splice(i,1);
  }

  for(var i=enemies.length-1;i>=0;i--) {
    var e=enemies[i];
    e.x+=e.vx; e.y+=e.vy; e.rot+=e.rs;
    if(e.x<e.t.sz || e.x>GW-e.t.sz) e.vx*=-1;

    var killed=false;
    for(var j=bullets.length-1;j>=0;j--) {
      if(cc(e.x,e.y,e.t.sz*0.8,bullets[j].x,bullets[j].y,5)) {
        bullets.splice(j,1);
        e.hp--;
        if(e.hp<=0) {
          score+=e.t.pts; hud();
          burst(e.x,e.y,e.t.col,16);
          enemies.splice(i,1); killed=true;
        }
        break;
      }
    }
    if(killed) continue;
    if(e.y > GH+e.t.sz*2) { enemies.splice(i,1); continue; }
    if(plane.inv===0 && cc(e.x,e.y,e.t.sz*0.65,plane.x,plane.y,16)) {
      lives--; plane.inv=80;
      burst(plane.x,plane.y,'#00d4ff',18); hud();
      if(lives<=0) { gameOver(); return; }
    }
  }

  for(var i=particles.length-1;i>=0;i--) {
    var p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }

  for(var i=0;i<stars.length;i++) {
    stars[i].y += stars[i].spd;
    if(stars[i].y > GH) { stars[i].y=0; stars[i].x=Math.random()*GW; }
  }
}

function drawPlane(x,y,blink) {
  if(blink) return;
  ctx.save(); ctx.translate(x,y);
  // flame
  ctx.shadowBlur=14; ctx.shadowColor='#ff8800';
  var fl = 8+Math.random()*8;
  var gf = ctx.createLinearGradient(0,12,0,12+fl);
  gf.addColorStop(0,'#ffe600'); gf.addColorStop(1,'rgba(255,140,0,0)');
  ctx.fillStyle=gf;
  ctx.beginPath();
  ctx.moveTo(-4,12); ctx.lineTo(4,12);
  ctx.lineTo(1.5,12+fl); ctx.lineTo(-1.5,12+fl);
  ctx.closePath(); ctx.fill();
  // fuselage
  ctx.shadowBlur=12; ctx.shadowColor='#00d4ff';
  ctx.fillStyle='#c8e8ff';
  ctx.beginPath();
  ctx.moveTo(0,-20); ctx.lineTo(7,2); ctx.lineTo(5,12);
  ctx.lineTo(-5,12); ctx.lineTo(-7,2); ctx.closePath(); ctx.fill();
  // cockpit
  ctx.fillStyle='#00d4ff';
  ctx.beginPath(); ctx.ellipse(0,-7,4.5,7,0,0,Math.PI*2); ctx.fill();
  // wings
  ctx.fillStyle='#7ab8e8';
  ctx.beginPath(); ctx.moveTo(-7,2); ctx.lineTo(-22,10); ctx.lineTo(-15,13); ctx.lineTo(-5,8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7,2);  ctx.lineTo(22,10);  ctx.lineTo(15,13);  ctx.lineTo(5,8);  ctx.closePath(); ctx.fill();
  // tails
  ctx.fillStyle='#9ecde8';
  ctx.beginPath(); ctx.moveTo(-5,12); ctx.lineTo(-11,20); ctx.lineTo(-4,15); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(5,12);  ctx.lineTo(11,20);  ctx.lineTo(4,15);  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.shadowBlur=14; ctx.shadowColor=e.t.col;
  ctx.fillStyle=e.t.col;
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.2;
  var s=e.t.sz;

  if(e.t.shape==='rock') {
    ctx.rotate(e.rot);
    ctx.beginPath();
    for(var i=0;i<8;i++) {
      var a=(i/8)*Math.PI*2;
      var r=s*(0.65+Math.sin(i*2.1+e.seed)*0.32);
      if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();

  } else if(e.t.shape==='ufo') {
    ctx.beginPath(); ctx.ellipse(0,4,s,s*0.38,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.55,s*0.42,0,Math.PI,0); ctx.fill();
    var lc=['#ffe600','#39ff14','#ff2d78'];
    for(var i=-1;i<=1;i++) {
      ctx.fillStyle=lc[i+1]; ctx.shadowColor=lc[i+1];
      ctx.beginPath(); ctx.arc(i*s*0.38,5,3,0,Math.PI*2); ctx.fill();
    }

  } else if(e.t.shape==='ast') {
    ctx.rotate(e.rot);
    ctx.beginPath();
    for(var i=0;i<6;i++) {
      var a=(i/6)*Math.PI*2;
      var r=s*(0.55+(i%2)*0.42);
      if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.arc(-s*0.2,-s*0.1,s*0.25,0,Math.PI*2); ctx.fill();

  } else { // ship
    ctx.beginPath();
    ctx.moveTo(0,s); ctx.lineTo(-s*0.6,-s*0.4);
    ctx.lineTo(0,-s*0.15); ctx.lineTo(s*0.6,-s*0.4);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(s*0.48)+'px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(e.hp,0,0);
  }
  ctx.restore();
}

function draw() {
  ctx.fillStyle='#050a14';
  ctx.fillRect(0,0,GW,GH);

  // stars
  for(var i=0;i<stars.length;i++) {
    var s=stars[i];
    ctx.globalAlpha=s.a; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // nebula
  var nb=ctx.createRadialGradient(GW*0.3,GH*0.35,0,GW*0.3,GH*0.35,GW*0.6);
  nb.addColorStop(0,'rgba(20,0,60,0.35)'); nb.addColorStop(1,'rgba(5,10,20,0)');
  ctx.fillStyle=nb; ctx.fillRect(0,0,GW,GH);

  if(gState!=='play') return;

  // bullets
  for(var i=0;i<bullets.length;i++) {
    var b=bullets[i];
    ctx.save();
    ctx.shadowBlur=12; ctx.shadowColor='#ffe600';
    var gb=ctx.createLinearGradient(b.x,b.y-16,b.x,b.y);
    gb.addColorStop(0,'#ffe600'); gb.addColorStop(1,'rgba(255,230,0,0)');
    ctx.fillStyle=gb;
    ctx.fillRect(b.x-2.5,b.y-16,5,16);
    ctx.restore();
  }

  // enemies
  for(var i=0;i<enemies.length;i++) drawEnemy(enemies[i]);

  // particles
  for(var i=0;i<particles.length;i++) {
    var p=particles[i];
    ctx.save();
    ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.shadowBlur=7; ctx.shadowColor=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // plane
  var blink = plane.inv>0 && Math.floor(frame/5)%2===1;
  drawPlane(plane.x,plane.y,blink);
}

function gameOver() {
  gState='over';
  document.getElementById('finalScore').textContent='SCORE : '+score;
  document.getElementById('scrOver').classList.remove('off');
}

function startGame() {
  document.getElementById('scrStart').classList.add('off');
  document.getElementById('scrOver').classList.add('off');
  init(); gState='play';
}

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRestart').addEventListener('click', startGame);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
