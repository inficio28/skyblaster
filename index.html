<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKY BLASTER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a14;
      --neon-blue: #00d4ff;
      --neon-pink: #ff2d78;
      --neon-yellow: #ffe600;
      --neon-green: #39ff14;
      --grid: rgba(0, 212, 255, 0.06);
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Orbitron', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 8s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 0 40px; }
    }

    #ui {
      position: relative;
      z-index: 10;
      width: min(500px, 96vw);
    }

    /* Header bar */
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--neon-blue);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-size: clamp(10px, 2.5vw, 13px);
      letter-spacing: 2px;
    }

    #hud span { color: var(--neon-blue); }
    #score-val, #level-val, #lives-val { color: var(--neon-yellow); font-weight: 700; }

    /* Canvas */
    #gameCanvas {
      display: block;
      width: min(500px, 96vw);
      height: min(640px, 80dvh);
      border: 1px solid var(--neon-blue);
      border-top: none;
      border-bottom: none;
      image-rendering: pixelated;
      cursor: none;
      background: transparent;
      position: relative;
      z-index: 5;
    }

    /* Controls bar */
    #controls-bar {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--neon-blue);
      border-top: none;
      border-radius: 0 0 4px 4px;
      justify-content: center;
    }

    .touch-btn {
      flex: 1;
      max-width: 80px;
      height: 44px;
      border: 1px solid var(--neon-blue);
      background: rgba(0, 212, 255, 0.07);
      color: var(--neon-blue);
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .touch-btn:active, .touch-btn.pressed {
      background: rgba(0, 212, 255, 0.22);
      box-shadow: 0 0 12px var(--neon-blue);
    }

    #fire-btn {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      max-width: 120px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    #fire-btn:active, #fire-btn.pressed {
      background: rgba(255, 45, 120, 0.2);
      box-shadow: 0 0 14px var(--neon-pink);
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 10, 20, 0.88);
      z-index: 20;
      border-radius: 0;
      gap: 18px;
      padding: 24px;
      text-align: center;
    }

    .overlay.hidden { display: none; }

    .overlay h1 {
      font-size: clamp(28px, 9vw, 56px);
      font-weight: 900;
      letter-spacing: 4px;
      line-height: 1;
      text-shadow: 0 0 20px var(--neon-blue), 0 0 60px var(--neon-blue);
      color: var(--neon-blue);
    }

    .overlay h2 {
      font-size: clamp(14px, 4vw, 22px);
      color: var(--neon-pink);
      letter-spacing: 3px;
      text-shadow: 0 0 10px var(--neon-pink);
    }

    .overlay p {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11px, 3vw, 14px);
      color: #aaa;
      line-height: 1.7;
      max-width: 340px;
    }

    .overlay p span { color: var(--neon-yellow); }

    .btn-start {
      padding: 14px 36px;
      border: 2px solid var(--neon-green);
      background: transparent;
      color: var(--neon-green);
      font-family: 'Orbitron', monospace;
      font-size: clamp(13px, 3.5vw, 16px);
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, box-shadow 0.15s;
      text-shadow: 0 0 8px var(--neon-green);
      box-shadow: 0 0 12px rgba(57,255,20,0.3);
    }

    .btn-start:hover {
      background: rgba(57,255,20,0.12);
      box-shadow: 0 0 24px var(--neon-green);
    }

    #final-score {
      font-size: clamp(18px, 5vw, 28px);
      color: var(--neon-yellow);
      text-shadow: 0 0 14px var(--neon-yellow);
    }

    #wrapper {
      position: relative;
      z-index: 5;
      width: min(500px, 96vw);
    }
  </style>
</head>
<body>

<div id="ui">
  <div id="hud">
    <div><span>SCORE </span><span id="score-val">0</span></div>
    <div><span>LEVEL </span><span id="level-val">1</span></div>
    <div><span>VIES </span><span id="lives-val">❤❤❤</span></div>
  </div>

  <div id="wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- Start screen -->
    <div class="overlay" id="startScreen">
      <h1>SKY<br>BLASTER</h1>
      <h2>— ARCADE SHOOTER —</h2>
      <p>
        <span>↑ ↓ ← →</span> Déplacer l'avion<br>
        <span>ESPACE</span> Tirer<br>
        Sur mobile : boutons ci-dessous
      </p>
      <button class="btn-start" id="startBtn">▶ JOUER</button>
    </div>

    <!-- Game over screen -->
    <div class="overlay hidden" id="gameOverScreen">
      <h1>GAME<br>OVER</h1>
      <div id="final-score">SCORE : 0</div>
      <button class="btn-start" id="restartBtn">↩ REJOUER</button>
    </div>
  </div>

  <!-- Touch controls -->
  <div id="controls-bar">
    <button class="touch-btn" id="btn-left">◀</button>
    <button class="touch-btn" id="btn-up">▲</button>
    <button class="touch-btn" id="btn-down">▼</button>
    <button class="touch-btn" id="btn-right">▶</button>
    <button class="touch-btn" id="fire-btn">🔥 FEU</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Responsive canvas resolution
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width);
    canvas.height = Math.round(rect.height);
  }
  resize();
  window.addEventListener('resize', () => { resize(); });

  // ─── State ───────────────────────────────────────────────────────────────────
  let state = 'start'; // 'start' | 'play' | 'over'
  let score = 0, lives = 3, level = 1;
  let frame = 0;

  const keys = {};
  const touch = { left:false, right:false, up:false, down:false, fire:false };

  // ─── Entities ────────────────────────────────────────────────────────────────
  let plane, bullets, enemies, particles, stars, explosions;

  function initGame() {
    score = 0; lives = 3; level = 1; frame = 0;
    updateHUD();

    plane = {
      x: canvas.width / 2,
      y: canvas.height * 0.78,
      w: 36, h: 36,
      speed: 4,
      cooldown: 0,
      invincible: 0,
    };

    bullets    = [];
    enemies    = [];
    particles  = [];
    explosions = [];

    // Parallax stars
    stars = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      speed: Math.random() * 1.2 + 0.3,
      alpha: Math.random() * 0.7 + 0.3,
    }));
  }

  function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('level-val').textContent = level;
    document.getElementById('lives-val').textContent = '❤'.repeat(lives);
  }

  // ─── Drawing helpers ─────────────────────────────────────────────────────────
  function drawPlane(x, y, blink) {
    if (blink) return; // blink when invincible
    ctx.save();
    ctx.translate(x, y);

    // Engine glow
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#00d4ff';

    // Fuselage
    ctx.fillStyle = '#b8e0ff';
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(6, 4);
    ctx.lineTo(4, 10);
    ctx.lineTo(-4, 10);
    ctx.lineTo(-6, 4);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#00d4ff';
    ctx.beginPath();
    ctx.ellipse(0, -6, 4, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    ctx.fillStyle = '#7ab8e8';
    ctx.beginPath();
    ctx.moveTo(-6, 4);
    ctx.lineTo(-20, 12);
    ctx.lineTo(-14, 14);
    ctx.lineTo(-4, 8);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(6, 4);
    ctx.lineTo(20, 12);
    ctx.lineTo(14, 14);
    ctx.lineTo(4, 8);
    ctx.closePath();
    ctx.fill();

    // Tail
    ctx.fillStyle = '#9ecde8';
    ctx.beginPath();
    ctx.moveTo(-4, 10);
    ctx.lineTo(-10, 18);
    ctx.lineTo(-3, 14);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 10);
    ctx.lineTo(10, 18);
    ctx.lineTo(3, 14);
    ctx.closePath();
    ctx.fill();

    // Engine fire
    ctx.shadowColor = '#ff8c00';
    const fl = 6 + Math.random() * 6;
    const grad = ctx.createLinearGradient(0, 10, 0, 10 + fl);
    grad.addColorStop(0, '#ffe600');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-3, 10);
    ctx.lineTo(3, 10);
    ctx.lineTo(1, 10 + fl);
    ctx.lineTo(-1, 10 + fl);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  const ENEMY_TYPES = [
    { color: '#ff2d78', size: 18, hp: 1, speed: 1.5, score: 10, shape: 'rock' },
    { color: '#ff8c00', size: 22, hp: 2, speed: 1.0, score: 20, shape: 'ufo' },
    { color: '#bf00ff', size: 14, hp: 1, speed: 2.5, score: 15, shape: 'asteroid' },
    { color: '#ffe600', size: 28, hp: 3, speed: 0.7, score: 40, shape: 'ship' },
  ];

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.shadowBlur = 14;
    ctx.shadowColor = e.type.color;
    ctx.fillStyle = e.type.color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;

    const s = e.type.size;

    if (e.type.shape === 'rock') {
      ctx.beginPath();
      for (let i = 0; i < 7; i++) {
        const a = (i / 7) * Math.PI * 2 + e.rot;
        const r = s * (0.7 + Math.sin(i * 2.3 + e.seed) * 0.3);
        i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (e.type.shape === 'ufo') {
      ctx.beginPath();
      ctx.ellipse(0, 0, s, s * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff8';
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.2, s * 0.5, s * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type.shape === 'asteroid') {
      ctx.rotate(e.rot);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        const r = s * (0.6 + (i % 2) * 0.4);
        i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else { // ship
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.lineTo(-s * 0.6, -s * 0.4);
      ctx.lineTo(0, -s * 0.1);
      ctx.lineTo(s * 0.6, -s * 0.4);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // hp indicator
      if (e.hp > 1) {
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${s * 0.5}px Orbitron`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(e.hp, 0, 0);
      }
    }
    ctx.restore();
  }

  function spawnEnemy() {
    const t = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
    const s = t.size;
    enemies.push({
      x: s + Math.random() * (canvas.width - s * 2),
      y: -s,
      vx: (Math.random() - 0.5) * 1.2,
      vy: t.speed + level * 0.18,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.07,
      seed: Math.random() * 10,
      type: t,
      hp: t.hp,
    });
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: Math.random() * 0.04 + 0.02,
        r: Math.random() * 3 + 1,
        color,
      });
    }
  }

  // ─── Input ───────────────────────────────────────────────────────────────────
  window.addEventListener('keydown', e => { keys[e.code] = true; });
  window.addEventListener('keyup',   e => { keys[e.code] = false; });

  function bindBtn(id, prop) {
    const el = document.getElementById(id);
    const set = v => { touch[prop] = v; el.classList.toggle('pressed', v); };
    el.addEventListener('touchstart', e => { e.preventDefault(); set(true); }, {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); set(false); });
    el.addEventListener('mousedown',  () => set(true));
    el.addEventListener('mouseup',    () => set(false));
    el.addEventListener('mouseleave', () => set(false));
  }
  bindBtn('btn-left',  'left');
  bindBtn('btn-right', 'right');
  bindBtn('btn-up',    'up');
  bindBtn('btn-down',  'down');
  bindBtn('fire-btn',  'fire');

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    initGame();
    state = 'play';
  }

  // ─── Collision ────────────────────────────────────────────────────────────────
  function circleRect(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = Math.max(rx - rw/2, Math.min(cx, rx + rw/2));
    const nearY = Math.max(ry - rh/2, Math.min(cy, ry + rh/2));
    return (cx - nearX)**2 + (cy - nearY)**2 < cr * cr;
  }

  // ─── Main loop ────────────────────────────────────────────────────────────────
  function update() {
    if (state !== 'play') return;
    frame++;

    // Level progression
    const newLevel = 1 + Math.floor(score / 200);
    if (newLevel !== level) { level = newLevel; updateHUD(); }

    // Spawn enemies
    const spawnRate = Math.max(30, 90 - level * 6);
    if (frame % spawnRate === 0) spawnEnemy();

    // Plane movement
    const spd = plane.speed + level * 0.15;
    if ((keys['ArrowLeft']  || keys['KeyA'] || touch.left)  && plane.x > plane.w/2)     plane.x -= spd;
    if ((keys['ArrowRight'] || keys['KeyD'] || touch.right) && plane.x < canvas.width - plane.w/2) plane.x += spd;
    if ((keys['ArrowUp']    || keys['KeyW'] || touch.up)    && plane.y > plane.h/2)     plane.y -= spd;
    if ((keys['ArrowDown']  || keys['KeyS'] || touch.down)  && plane.y < canvas.height - plane.h/2) plane.y += spd;

    // Shooting
    if (plane.cooldown > 0) plane.cooldown--;
    if ((keys['Space'] || keys['KeyZ'] || touch.fire) && plane.cooldown === 0) {
      bullets.push({ x: plane.x, y: plane.y - 16, w: 4, h: 14 });
      plane.cooldown = Math.max(8, 18 - level);
    }

    // Invincibility frames
    if (plane.invincible > 0) plane.invincible--;

    // Bullets
    bullets = bullets.filter(b => {
      b.y -= 10;
      return b.y > -20;
    });

    // Enemies
    enemies = enemies.filter(e => {
      e.x += e.vx;
      e.y += e.vy;
      e.rot += e.rotSpeed;

      // Bounce off walls
      if (e.x < e.type.size || e.x > canvas.width - e.type.size) e.vx *= -1;

      // Bullet collision
      let hit = false;
      bullets = bullets.filter(b => {
        if (!hit && circleRect(e.x, e.y, e.type.size * 0.8, b.x, b.y, b.w, b.h)) {
          e.hp--;
          if (e.hp <= 0) {
            score += e.type.score;
            updateHUD();
            spawnParticles(e.x, e.y, e.type.color, 16);
            hit = true;
          }
          return false;
        }
        return true;
      });
      if (hit) return false;

      // Plane collision
      if (plane.invincible === 0 &&
          circleRect(e.x, e.y, e.type.size * 0.7, plane.x, plane.y, plane.w * 0.7, plane.h * 0.7)) {
        lives--;
        plane.invincible = 90;
        spawnParticles(plane.x, plane.y, '#00d4ff', 20);
        updateHUD();
        if (lives <= 0) { gameOver(); return false; }
      }

      return e.y < canvas.height + e.type.size * 2;
    });

    // Particles
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.05;
      p.life -= p.decay;
      return p.life > 0;
    });

    // Stars
    stars.forEach(s => {
      s.y += s.speed;
      if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Nebula background
    const nebula = ctx.createRadialGradient(
      canvas.width * 0.3, canvas.height * 0.4, 0,
      canvas.width * 0.3, canvas.height * 0.4, canvas.width * 0.7
    );
    nebula.addColorStop(0, 'rgba(10,0,40,0.9)');
    nebula.addColorStop(1, 'rgba(5,10,20,0)');
    ctx.fillStyle = nebula;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Stars
    stars.forEach(s => {
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    if (state !== 'play') return;

    // Bullets
    bullets.forEach(b => {
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ffe600';
      const g = ctx.createLinearGradient(b.x, b.y - b.h, b.x, b.y);
      g.addColorStop(0, '#ffe600');
      g.addColorStop(1, 'rgba(255,230,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(b.x - b.w/2, b.y - b.h, b.w, b.h);
      ctx.restore();
    });

    // Enemies
    enemies.forEach(e => drawEnemy(e));

    // Particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 6; ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Plane (blink when invincible)
    const blink = plane.invincible > 0 && Math.floor(frame / 5) % 2 === 0;
    drawPlane(plane.x, plane.y, blink);

    // Crosshair cursor (desktop)
    if (!('ontouchstart' in window)) {
      // nothing – cursor hidden via CSS
    }
  }

  function gameOver() {
    state = 'over';
    document.getElementById('final-score').textContent = 'SCORE : ' + score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
