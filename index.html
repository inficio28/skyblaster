<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SKY BLASTER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#050a14;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:monospace;
  color:#fff;
  overflow:hidden;
  touch-action:none;
  user-select:none;
}
#wrapper{
  display:flex;
  flex-direction:column;
  width:min(440px, 98vw);
}
#hud{
  display:flex;
  justify-content:space-between;
  padding:6px 12px;
  background:#000;
  border:2px solid #00d4ff;
  border-bottom:none;
  font-size:13px;
  letter-spacing:2px;
}
.hl{color:#00d4ff;}
.hv{color:#ffe600;font-weight:bold;}
/* THE FIX: use aspect-ratio so the canvas container always has height */
#cWrap{
  position:relative;
  width:100%;
  aspect-ratio: 440 / 580;
  background:#050a14;
  border:2px solid #00d4ff;
  overflow:hidden;
}
canvas{
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
}
#pad{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr 1.5fr;
  gap:4px;
  padding:6px;
  background:#000;
  border:2px solid #00d4ff;
  border-top:none;
}
.btn{
  padding:10px 0;
  border:1px solid #00d4ff;
  background:rgba(0,212,255,.08);
  color:#00d4ff;
  font-size:20px;
  border-radius:4px;
  cursor:pointer;
  text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.btn:active, .btn.on{
  background:rgba(0,212,255,.28);
  box-shadow:0 0 10px #00d4ff;
}
#bFire{
  border-color:#ff2d78;
  color:#ff2d78;
  font-size:12px;
}
#bFire:active, #bFire.on{
  background:rgba(255,45,120,.22);
  box-shadow:0 0 10px #ff2d78;
}
/* overlays */
.ov{
  position:absolute;
  inset:0;
  background:rgba(4,8,18,.92);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:20px;
  text-align:center;
  z-index:5;
}
.ov.off{display:none;}
.ov h1{
  font-size:clamp(32px,10vw,56px);
  font-weight:900;
  color:#00d4ff;
  text-shadow:0 0 24px #00d4ff;
  line-height:1.1;
  letter-spacing:4px;
}
.ov h2{font-size:13px;color:#ff2d78;letter-spacing:3px;margin-top:-6px;}
.ov p{font-size:13px;color:#aaa;line-height:2;}
.ov p b{color:#ffe600;}
.ov button{
  margin-top:8px;
  padding:12px 36px;
  border:2px solid #39ff14;
  background:transparent;
  color:#39ff14;
  font-size:14px;
  letter-spacing:3px;
  border-radius:4px;
  cursor:pointer;
  text-shadow:0 0 8px #39ff14;
}
.ov button:hover{background:rgba(57,255,20,.14);}
#finalScore{font-size:22px;color:#ffe600;text-shadow:0 0 12px #ffe600;}
</style>
</head>
<body>

<div id="wrapper">
  <div id="hud">
    <div><span class="hl">SCORE </span><span class="hv" id="sScore">0</span></div>
    <div><span class="hl">LEVEL </span><span class="hv" id="sLevel">1</span></div>
    <div><span class="hl">VIES </span><span class="hv" id="sLives">3</span></div>
  </div>

  <div id="cWrap">
    <canvas id="c"></canvas>

    <div class="ov" id="scrStart">
      <h1>SKY<br>BLASTER</h1>
      <h2>ARCADE SHOOTER</h2>
      <p>
        <b>Fleches</b> pour bouger<br>
        <b>ESPACE</b> pour tirer<br>
        <b>Mobile :</b> boutons en bas
      </p>
      <button id="btnStart">JOUER</button>
    </div>

    <div class="ov off" id="scrOver">
      <h1>GAME<br>OVER</h1>
      <div id="finalScore">0</div>
      <button id="btnRestart">REJOUER</button>
    </div>
  </div>

  <div id="pad">
    <button class="btn" id="bLeft">&#9664;</button>
    <button class="btn" id="bUp">&#9650;</button>
    <button class="btn" id="bDown">&#9660;</button>
    <button class="btn" id="bRight">&#9654;</button>
    <button class="btn" id="bFire">FEU</button>
  </div>
</div>

<script>
// ── Setup ─────────────────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');

// Internal resolution
var W = 440, H = 580;
canvas.width  = W;
canvas.height = H;

// ── Input ─────────────────────────────────────────────────────────────────────
var K = {};
document.addEventListener('keydown', function(e){
  K[e.code] = true;
  if(e.code === 'Space' || e.code.startsWith('Arrow')) e.preventDefault();
});
document.addEventListener('keyup', function(e){ K[e.code] = false; });

var T = {left:false,right:false,up:false,down:false,fire:false};

function bindBtn(id, key){
  var el = document.getElementById(id);
  function dn(e){ e.preventDefault(); T[key]=true;  el.classList.add('on'); }
  function up(e){ e.preventDefault(); T[key]=false; el.classList.remove('on'); }
  el.addEventListener('touchstart', dn, {passive:false});
  el.addEventListener('touchend',   up, {passive:false});
  el.addEventListener('mousedown', dn);
  el.addEventListener('mouseup',   up);
  el.addEventListener('mouseleave',up);
}
bindBtn('bLeft',  'left');
bindBtn('bRight', 'right');
bindBtn('bUp',    'up');
bindBtn('bDown',  'down');
bindBtn('bFire',  'fire');

// ── Game variables ────────────────────────────────────────────────────────────
var STATE = 'start';
var score, lives, level, tick;
var px, py, pcool, pinv;   // plane
var bullets, enemies, sparks, stars;

function resetGame(){
  score = 0; lives = 3; level = 1; tick = 0;
  px = W/2; py = H * 0.8; pcool = 0; pinv = 0;
  bullets  = [];
  enemies  = [];
  sparks   = [];
  stars    = [];
  for(var i=0;i<70;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.5+0.3,
      s: Math.random()*1.3+0.3,
      a: Math.random()*0.8+0.2
    });
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('sScore').textContent = score;
  document.getElementById('sLevel').textContent = level;
  document.getElementById('sLives').textContent = lives;
}

// ── Enemy definitions ─────────────────────────────────────────────────────────
var EDEFS = [
  { color:'#ff3366', radius:16, maxhp:1, speed:1.8, pts:10, kind:'rock'  },
  { color:'#ff8800', radius:20, maxhp:2, speed:1.1, pts:25, kind:'ufo'   },
  { color:'#aa00ff', radius:13, maxhp:1, speed:2.6, pts:15, kind:'gem'   },
  { color:'#ffdd00', radius:26, maxhp:4, speed:0.6, pts:60, kind:'boss'  },
];

function spawnEnemy(){
  var def = EDEFS[Math.floor(Math.random()*EDEFS.length)];
  var r   = def.radius;
  enemies.push({
    x:    r + Math.random()*(W - r*2),
    y:    -r,
    vx:   (Math.random()-0.5) * 1.8,
    vy:   def.speed + level*0.1,
    rot:  Math.random()*6.28,
    rs:   (Math.random()-0.5)*0.07,
    def:  def,
    hp:   def.maxhp,
    seed: Math.random()*10
  });
}

function addSparks(x, y, color, n){
  for(var i=0; i<n; i++){
    var a = Math.random()*6.28;
    var s = Math.random()*4+1;
    sparks.push({
      x:x, y:y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life:1,
      decay: Math.random()*0.05+0.02,
      r: Math.random()*3+1,
      color: color
    });
  }
}

// Circle vs circle collision
function hit(ax,ay,ar, bx,by,br){
  var dx=ax-bx, dy=ay-by;
  return dx*dx+dy*dy < (ar+br)*(ar+br);
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(){
  if(STATE !== 'play') return;
  tick++;

  // Level
  var nl = 1 + Math.floor(score/200);
  if(nl !== level){ level=nl; updateHUD(); }

  // Spawn
  var every = Math.max(25, 80 - level*5);
  if(tick % every === 0) spawnEnemy();

  // Move plane
  var spd = 4.5 + level*0.08;
  if((K.ArrowLeft  || K.KeyA || T.left)  && px > 20)    px -= spd;
  if((K.ArrowRight || K.KeyD || T.right) && px < W-20)  px += spd;
  if((K.ArrowUp    || K.KeyW || T.up)    && py > 20)    py -= spd;
  if((K.ArrowDown  || K.KeyS || T.down)  && py < H-20)  py += spd;

  // Shoot
  if(pcool > 0) pcool--;
  if((K.Space || K.KeyZ || T.fire) && pcool === 0){
    bullets.push({x:px, y:py-22, vy:-12});
    pcool = Math.max(8, 18-level);
  }

  // Invincibility
  if(pinv > 0) pinv--;

  // Bullets
  for(var i=bullets.length-1; i>=0; i--){
    bullets[i].y += bullets[i].vy;
    if(bullets[i].y < -10) bullets.splice(i,1);
  }

  // Enemies
  for(var i=enemies.length-1; i>=0; i--){
    var e = enemies[i];
    e.x  += e.vx;
    e.y  += e.vy;
    e.rot += e.rs;
    // Bounce off walls
    if(e.x < e.def.radius)   { e.x = e.def.radius;   e.vx = Math.abs(e.vx); }
    if(e.x > W-e.def.radius) { e.x = W-e.def.radius; e.vx = -Math.abs(e.vx); }

    // Check bullet hits
    var destroyed = false;
    for(var j=bullets.length-1; j>=0; j--){
      if(hit(e.x, e.y, e.def.radius*0.85, bullets[j].x, bullets[j].y, 4)){
        bullets.splice(j,1);
        e.hp--;
        addSparks(e.x, e.y, e.def.color, 5);
        if(e.hp <= 0){
          score += e.def.pts;
          updateHUD();
          addSparks(e.x, e.y, e.def.color, 18);
          enemies.splice(i,1);
          destroyed = true;
        }
        break;
      }
    }
    if(destroyed) continue;

    // Off-screen
    if(e.y > H + e.def.radius*2){ enemies.splice(i,1); continue; }

    // Hit player
    if(pinv === 0 && hit(e.x, e.y, e.def.radius*0.7, px, py, 15)){
      lives--;
      pinv = 90;
      addSparks(px, py, '#00d4ff', 20);
      updateHUD();
      if(lives <= 0){ endGame(); return; }
    }
  }

  // Sparks
  for(var i=sparks.length-1; i>=0; i--){
    var s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.05;
    s.life -= s.decay;
    if(s.life <= 0) sparks.splice(i,1);
  }

  // Stars scroll
  for(var i=0; i<stars.length; i++){
    stars[i].y += stars[i].s;
    if(stars[i].y > H){ stars[i].y = 0; stars[i].x = Math.random()*W; }
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawPlane(x, y, blink){
  if(blink) return;
  ctx.save();
  ctx.translate(x, y);

  // Engine flame
  var fh = 8 + Math.random()*9;
  var gf = ctx.createLinearGradient(0,14,0,14+fh);
  gf.addColorStop(0,'#ffcc00');
  gf.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle = gf;
  ctx.shadowBlur = 12; ctx.shadowColor = '#ff8800';
  ctx.beginPath();
  ctx.moveTo(-3.5,13); ctx.lineTo(3.5,13);
  ctx.lineTo(2,13+fh); ctx.lineTo(-2,13+fh);
  ctx.closePath(); ctx.fill();

  // Body
  ctx.shadowBlur = 10; ctx.shadowColor = '#00d4ff';
  ctx.fillStyle = '#cce8ff';
  ctx.beginPath();
  ctx.moveTo(0,-22);
  ctx.bezierCurveTo(6,-10, 7,2, 6,13);
  ctx.lineTo(-6,13);
  ctx.bezierCurveTo(-7,2, -6,-10, 0,-22);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#00d4ff';
  ctx.shadowColor = '#00d4ff';
  ctx.beginPath();
  ctx.ellipse(0,-8, 4, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Wings
  ctx.shadowBlur = 6; ctx.fillStyle = '#6aaddd';
  ctx.beginPath();
  ctx.moveTo(-6,2); ctx.lineTo(-24,12); ctx.lineTo(-16,14); ctx.lineTo(-5,9);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(6,2); ctx.lineTo(24,12); ctx.lineTo(16,14); ctx.lineTo(5,9);
  ctx.closePath(); ctx.fill();

  // Tail
  ctx.shadowBlur = 4; ctx.fillStyle = '#88bce0';
  ctx.beginPath();
  ctx.moveTo(-6,13); ctx.lineTo(-12,22); ctx.lineTo(-4,16);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(6,13); ctx.lineTo(12,22); ctx.lineTo(4,16);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawEnemy(e){
  var d = e.def, r = d.radius;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(e.rot);
  ctx.shadowBlur = 14; ctx.shadowColor = d.color;
  ctx.fillStyle  = d.color;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.5;

  if(d.kind === 'rock'){
    ctx.beginPath();
    for(var i=0;i<8;i++){
      var a = i/8*6.28;
      var lr = r * (0.6 + Math.sin(i*2+e.seed)*0.38);
      if(i===0) ctx.moveTo(Math.cos(a)*lr, Math.sin(a)*lr);
      else       ctx.lineTo(Math.cos(a)*lr, Math.sin(a)*lr);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();

  } else if(d.kind === 'ufo'){
    ctx.beginPath();
    ctx.ellipse(0, 5, r, r*0.35, 0, 0, 6.28);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, 1, r*0.5, r*0.4, 0, Math.PI, 0);
    ctx.fill();
    var lc = ['#ff0','#0f0','#f0f'];
    for(var i=-1;i<=1;i++){
      ctx.fillStyle = lc[i+1];
      ctx.shadowColor = lc[i+1];
      ctx.beginPath();
      ctx.arc(i*r*0.4, 6, 2.5, 0, 6.28);
      ctx.fill();
    }

  } else if(d.kind === 'gem'){
    ctx.beginPath();
    ctx.moveTo(0,-r); ctx.lineTo(r*0.6,-r*0.1);
    ctx.lineTo(r*0.4,r*0.8); ctx.lineTo(-r*0.4,r*0.8);
    ctx.lineTo(-r*0.6,-r*0.1);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.moveTo(0,-r*0.6); ctx.lineTo(r*0.3,0); ctx.lineTo(0,r*0.5); ctx.lineTo(-r*0.3,0);
    ctx.closePath(); ctx.fill();

  } else { // boss
    ctx.beginPath();
    ctx.moveTo(0,r); ctx.lineTo(-r*0.65,-r*0.4);
    ctx.lineTo(0,-r*0.12); ctx.lineTo(r*0.65,-r*0.4);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font = 'bold '+(r*0.55|0)+'px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(e.hp, 0, 0);
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  var g = ctx.createLinearGradient(b.x, b.y-18, b.x, b.y);
  g.addColorStop(0,'#ffe600');
  g.addColorStop(1,'rgba(255,230,0,0)');
  ctx.fillStyle = g;
  ctx.shadowBlur = 10; ctx.shadowColor = '#ffe600';
  ctx.fillRect(b.x-2, b.y-18, 4, 18);
  ctx.restore();
}

function render(){
  // Clear
  ctx.fillStyle = '#050a14';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for(var i=0; i<stars.length; i++){
    var s = stars[i];
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Gentle nebula glow
  var nb = ctx.createRadialGradient(W*0.3, H*0.3, 0, W*0.3, H*0.3, W*0.6);
  nb.addColorStop(0,'rgba(30,0,80,0.3)');
  nb.addColorStop(1,'rgba(5,10,20,0)');
  ctx.fillStyle = nb;
  ctx.fillRect(0,0,W,H);

  if(STATE !== 'play') return;

  // Bullets
  for(var i=0; i<bullets.length; i++) drawBullet(bullets[i]);

  // Enemies
  for(var i=0; i<enemies.length; i++) drawEnemy(enemies[i]);

  // Sparks
  for(var i=0; i<sparks.length; i++){
    var s = sparks[i];
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.shadowBlur = 6; ctx.shadowColor = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, 6.28);
    ctx.fill();
    ctx.restore();
  }

  // Plane (blink when invincible)
  var blink = pinv > 0 && (tick % 10) < 5;
  drawPlane(px, py, blink);
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function startGame(){
  resetGame();
  STATE = 'play';
  document.getElementById('scrStart').classList.add('off');
  document.getElementById('scrOver').classList.add('off');
}

function endGame(){
  STATE = 'over';
  document.getElementById('finalScore').textContent = 'SCORE : ' + score;
  document.getElementById('scrOver').classList.remove('off');
}

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRestart').addEventListener('click', startGame);

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
